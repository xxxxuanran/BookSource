name: Merge BookSources

on:
  workflow_dispatch:
  schedule:
    - cron: "0 20 * * *"

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Merge all book sources
        run: python ./scripts/merge_booksources.py

      - name: Commit merged file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bookSource.json
          if git diff --cached --quiet -- bookSource.json; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update bookSource.json"
          git push
